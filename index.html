<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Shithead Party Demo</title>
    <script src="libraries/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.party@0.8.0/dist/p5.party.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
  </head>
  <body>
    <main>
      <section id="setup-screen" class="screen">
        <h1>Shithead Party Demo</h1>
        <p class="screen-tagline">Join a room, choose your seat at the table, and start the round.</p>
        <p id="status-label">Waiting for room details...</p>

        <section class="join-panel">
          <label for="room">Enter Room Key</label>
          <input id="room" type="text">
          <label for="name">Enter Username</label>
          <input id="name" type="text">
          <button id="enter-room" type="button">Enter Room</button>
        </section>
      </section>

      <section id="play-screen" class="screen screen-hidden">
        <div class="play-header">
          <div class="play-title-block">
            <h1>Shithead Party Demo</h1>
            <div class="play-meta-row">
              <p id="room-label">Room: waiting...</p>
              <p id="play-status-label">Waiting for room details...</p>
            </div>
          </div>
          <button id="return-to-selection" type="button">Return To Selection</button>
        </div>

        <section class="control-panel">
          <button id="add-ai-player" type="button">Add AI Player</button>
          <button id="start-party" type="button">Host Deal Cards</button>
          <button id="reset-party" type="button">Host Reset Party</button>
          <button id="finish-swap" type="button">Lock Swaps</button>
          <button id="play-selected" type="button">Play Selected</button>
          <button id="pickup-discard" type="button">Take Discard</button>
        </section>

        <div id="canvas-shell" class="canvas-shell"></div>
      </section>
    </main>
    <script src="renderer.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>

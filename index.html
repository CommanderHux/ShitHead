<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Shithead Party Demo</title>
    <script src="libraries/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.party@0.8.0/dist/p5.party.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>p5.party GitHub Pages Demo</h1>
        <p>
          Open this page in two tabs or on two devices in the same room to see
          shared state update live.
        </p>
        <p id="room-label">Room: loading...</p>
        <p class="hint">
          Move your mouse to broadcast your cursor. Click the canvas to add to a
          shared party counter for everyone.
        </p>
      </section>
    </main>
    <script src="sketch.js"></script>
  </body>
</html>
